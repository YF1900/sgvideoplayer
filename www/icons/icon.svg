  </g>
  <g fill="#ff5e3a">
    <rect x="98"  y="98"  width="28" height="28" rx="3"/>
    <rect x="386" y="98"  width="28" height="28" rx="3"/>
    <rect x="98"  y="386" width="28" height="28" rx="3"/>
  </g>

