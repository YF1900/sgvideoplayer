<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0f17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QR動画" />
  <title>QR動画</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ホーム画面 -->
  <section id="home-screen" class="screen active">
    <header class="app-header">
      <button id="menu-btn" class="header-icon-btn" type="button" aria-label="メニュー" data-i18n-aria="aria.menu">
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
      </button>
      <h1 data-i18n="app.title">QR動画</h1>
      <button id="update-btn" class="header-icon-btn" type="button" aria-label="アプリを更新" data-i18n-aria="aria.update">
        <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
      </button>
      <button id="fullscreen-toggle" class="header-icon-btn hidden" type="button" aria-label="全画面表示" data-i18n-aria="aria.fullscreen">
        <span class="material-symbols-outlined" aria-hidden="true">fullscreen</span>
      </button>
    </header>
    <main class="home-main">
      <div id="install-banner" class="install-banner hidden">
        <div class="install-banner-text">
          <strong data-i18n="install.heading">アプリとして使う</strong>
          <span id="install-banner-hint"></span>
        </div>
        <div class="install-banner-actions">
          <button id="install-btn" class="secondary-btn hidden" type="button" data-i18n="install.install">インストール</button>
          <button id="install-dismiss" class="text-btn" type="button" aria-label="閉じる" data-i18n-aria="aria.close">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </div>
      </div>

      <button id="scan-btn" class="primary-btn" type="button">
        <span class="material-symbols-outlined btn-icon" aria-hidden="true">qr_code_scanner</span>
        <span data-i18n="app.scan">QRコードをスキャン</span>
      </button>

      <details class="manual-input">
        <summary data-i18n="app.manualInput">URLを直接入力</summary>
        <form id="manual-form" class="manual-form">
          <input
            id="manual-url"
            type="text"
            autocomplete="off"
            spellcheck="false"
            autocapitalize="off"
            placeholder="URL または UUID"
            data-i18n-placeholder="app.urlPlaceholder"
            required
          />
          <button type="submit" class="secondary-btn" data-i18n="app.play">再生</button>
        </form>
      </details>

      <section class="history-section">
        <div class="history-header">
          <h2 data-i18n="app.history">視聴履歴</h2>
          <button id="clear-all-btn" class="text-btn hidden" type="button" data-i18n="app.clearAll">すべて削除</button>
        </div>
        <ul id="history-list" class="history-list"></ul>
        <p id="empty-message" class="empty-message hidden" data-i18n-html="app.emptyHistory">
          まだ視聴履歴はありません。<br />「QRコードをスキャン」から始めましょう。
        </p>
      </section>
    </main>
    <form id="search-form" class="search-bar" role="search" autocomplete="off">
      <div class="search-input-wrap">
        <span class="material-symbols-outlined search-icon" aria-hidden="true">search</span>
        <input
          id="search-input"
          type="search"
          placeholder="タイトル・UUIDで検索"
          data-i18n-placeholder="app.searchPlaceholder"
          enterkeyhint="search"
        />
        <button
          type="button"
          id="search-clear"
          class="search-clear hidden"
          aria-label="検索をクリア"
          data-i18n-aria="aria.searchClear"
        >
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
      </div>
    </form>
  </section>

  <!-- スキャン画面 -->
  <section id="scan-screen" class="screen">
    <header class="app-header dark">
      <button id="scan-cancel" class="back-btn" type="button" aria-label="閉じる" data-i18n-aria="aria.close">
        <span class="material-symbols-outlined" aria-hidden="true">close</span>
      </button>
      <h2 data-i18n="scan.title">QRコードをスキャン</h2>
    </header>
    <div id="qr-reader" class="qr-reader">
      <video id="qr-video" playsinline muted autoplay></video>
      <div class="qr-overlay" aria-hidden="true">
        <div class="qr-frame"></div>
      </div>
    </div>
    <p class="scan-hint" data-i18n="scan.hint">hihaho の QRコードをカメラに向けてください</p>
    <p id="scan-error" class="scan-error hidden"></p>
  </section>

  <!-- プレーヤー画面 -->
  <section id="player-screen" class="screen player">
    <button id="player-back" class="back-btn floating" type="button" aria-label="閉じる" data-i18n-aria="aria.close">
      <span class="material-symbols-outlined" aria-hidden="true">close</span>
    </button>
    <button
      id="swipe-nav-top"
      class="swipe-nav-bar swipe-nav-top"
      type="button"
      aria-label="前の動画"
      data-i18n-aria="aria.prevVideo"
    >
      <span class="material-symbols-outlined" aria-hidden="true">keyboard_arrow_down</span>
    </button>
    <div id="player-loading" class="player-loading">
      <div class="spinner" aria-hidden="true"></div>
      <p data-i18n="player.loading">動画を読み込み中…</p>
    </div>
    <div id="player-error" class="player-error hidden">
      <div class="player-error-card">
        <h3 data-i18n="player.errorTitle">動画を表示できませんでした</h3>
        <p data-i18n="player.errorBody">
          hihaho の動画設定で、このアプリのドメインが「埋め込み許可ドメイン」に追加されているかご確認ください。
        </p>
        <p class="player-error-url" id="player-error-url"></p>
        <button id="player-error-open" class="secondary-btn" type="button" data-i18n="player.openInBrowser">ブラウザで開く</button>
      </div>
    </div>
    <div id="player-container" class="player-container">
      <iframe
        id="player-iframe"
        title="hihaho video"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture; accelerometer; gyroscope"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen
      ></iframe>
      <div id="player-tap-overlay" class="player-tap-overlay" aria-hidden="true"></div>
    </div>
    <button
      id="swipe-nav-bottom"
      class="swipe-nav-bar swipe-nav-bottom"
      type="button"
      aria-label="次の動画"
      data-i18n-aria="aria.nextVideo"
    >
      <span class="material-symbols-outlined" aria-hidden="true">keyboard_arrow_up</span>
    </button>
  </section>

  <!-- メニュー (左からスライド) -->
  <div id="menu-overlay" class="menu-overlay hidden" aria-hidden="true">
    <aside class="menu-panel" role="dialog" aria-modal="true" aria-labelledby="menu-title">
      <header class="menu-header">
        <h2 id="menu-title" data-i18n="menu.menu">メニュー</h2>
        <button id="menu-close" class="header-icon-btn" type="button" aria-label="閉じる" data-i18n-aria="aria.close">
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
      </header>
      <section class="menu-section">
        <h3 data-i18n="menu.language">言語</h3>
        <div class="menu-options">
          <button class="menu-option-btn menu-lang-btn" type="button" data-lang="ja">
            <span data-i18n="menu.langJa">日本語</span>
            <span class="material-symbols-outlined menu-option-check" aria-hidden="true">check</span>
          </button>
          <button class="menu-option-btn menu-lang-btn" type="button" data-lang="en">
            <span data-i18n="menu.langEn">English</span>
            <span class="material-symbols-outlined menu-option-check" aria-hidden="true">check</span>
          </button>
        </div>
      </section>

      <section class="menu-section">
        <h3 data-i18n="menu.sort">並び替え</h3>
        <div class="menu-options">
          <button class="menu-option-btn menu-sort-btn" type="button" data-sort="date_desc">
            <span data-i18n="sort.dateDesc">日付 (新しい順)</span>
            <span class="material-symbols-outlined menu-option-check" aria-hidden="true">check</span>
          </button>
          <button class="menu-option-btn menu-sort-btn" type="button" data-sort="date_asc">
            <span data-i18n="sort.dateAsc">日付 (古い順)</span>
            <span class="material-symbols-outlined menu-option-check" aria-hidden="true">check</span>
          </button>
          <button class="menu-option-btn menu-sort-btn" type="button" data-sort="name_asc">
            <span data-i18n="sort.nameAsc">名前 (A→Z)</span>
            <span class="material-symbols-outlined menu-option-check" aria-hidden="true">check</span>
          </button>
          <button class="menu-option-btn menu-sort-btn" type="button" data-sort="name_desc">
            <span data-i18n="sort.nameDesc">名前 (Z→A)</span>
            <span class="material-symbols-outlined menu-option-check" aria-hidden="true">check</span>
          </button>
          <button class="menu-option-btn menu-sort-btn" type="button" data-sort="custom">
            <span data-i18n="sort.custom">カスタム順 (ドラッグ)</span>
            <span class="material-symbols-outlined menu-option-check" aria-hidden="true">check</span>
          </button>
        </div>
      </section>
    </aside>
  </div>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
